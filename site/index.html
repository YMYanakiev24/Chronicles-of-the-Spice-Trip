<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The Mythic Chronicles: The Hidden World</title>
  <meta name="description" content="A dark Greek-mythology pixel-art RPG: sleeping gods, demigods, prophecies, monsters and ancient secrets in a hidden world." />
  <link rel="stylesheet" href="css/style.css" />
  <!-- A retro pixel display font (with a safe monospace fallback if offline). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- The canvas wrapper is what screen-shake transforms; the canvas fills it. -->
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- All HUD + menu DOM is injected here by the UI manager. -->
  <div id="ui"></div>

  <noscript>
    <div style="position:fixed;inset:0;display:grid;place-items:center;background:#0b1a18;color:#e8dcc0;font-family:serif;">
      This game requires JavaScript to be enabled.
    </div>
  </noscript>

  <script type="module" src="js/main.js"></script>
</body>
</html>
